alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
databases:
- cluster_name: db-postgresql-sfo2-54475
  db_name: defaultdb
  db_user: doadmin
  engine: PG
  name: db-postgresql-sfo2-54475
  production: true
  version: "17"
envs:
- key: DB_USER
  scope: RUN_AND_BUILD_TIME
  value: doadmin
- key: DB_PASSWORD
  scope: RUN_AND_BUILD_TIME
  value: AVNS_g4jVRrdip-MCVHjZA2j
- key: DB_HOST
  scope: RUN_AND_BUILD_TIME
  value: db-postgresql-sfo2-54475-do-user-20036710-0.e.db.ondigitalocean.com
- key: DB_PORT
  scope: RUN_AND_BUILD_TIME
  value: "25060"
- key: DB_NAME
  scope: RUN_AND_BUILD_TIME
  value: defaultdb
- key: DB_SSLMODE
  scope: RUN_AND_BUILD_TIME
  value: require
- key: SECRET_KEY
  scope: RUN_AND_BUILD_TIME
  value: something-random-secret
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: inventory-app
    match:
      authority:
        exact: ""
      path:
        prefix: /
name: mountain-west-inventory-app
region: sfo
services:
- environment_slug: python
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${db-postgresql-sfo2-54475.DATABASE_URL}
  github:
    branch: main
    deploy_on_push: true
    repo: ColtonBaum/Inventory-app
  http_port: 8080
  instance_count: 2
  instance_size_slug: apps-s-1vcpu-1gb
  name: inventory-app
  run_command: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
  source_dir: /
