{% extends "base.html" %}
{% block title %}Edit Product — {{ product.item_name or product.item_number }}{% endblock %}

{% block content %}
<!-- Billing Sub-Nav -->
<div style="display:flex;gap:4px;margin-bottom:18px;border-bottom:2px solid var(--border);padding-bottom:0;">
  <a href="{{ url_for('billing.billing_dashboard') }}" style="padding:10px 18px;font-weight:600;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);text-decoration:none;">Invoices</a>
  <a href="{{ url_for('billing.warehouse_inventory') }}" style="padding:10px 18px;font-weight:600;font-size:14px;border-bottom:2px solid var(--accent);margin-bottom:-2px;color:var(--text);text-decoration:none;">Warehouse Stock</a>
  <a href="{{ url_for('billing.warehouse_orders') }}" style="padding:10px 18px;font-weight:600;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);text-decoration:none;">Orders</a>
  <a href="{{ url_for('billing.specialty_tools') }}" style="padding:10px 18px;font-weight:600;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);text-decoration:none;">Specialty Tools</a>
  <a href="{{ url_for('billing.metrics') }}" style="padding:10px 18px;font-weight:600;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);text-decoration:none;">Metrics</a>
  <a href="{{ url_for('billing.tooling_lists_index') }}" style="padding:10px 18px;font-weight:600;font-size:14px;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);text-decoration:none;">Tooling Lists</a>
  <div style="flex:1;"></div>
  <a class="btn ghost small" href="{{ url_for('billing.logout') }}" style="margin-bottom:6px;">Log Out</a>
</div>

<div class="card" style="max-width:560px;margin:0 auto;">
  <div class="card-header">
    <h2 style="margin:0;font-size:20px;">Edit Product</h2>
    <a class="btn ghost small" href="{{ url_for('billing.warehouse_inventory') }}">Back</a>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="grid" style="gap:14px;">
        <div class="field">
          <label>Item Number</label>
          <input type="text" value="{{ product.item_number }}" disabled style="background:#f1f5f9;color:var(--muted);">
        </div>
        <div class="field">
          <label>Item Name</label>
          <input type="text" name="item_name" value="{{ product.item_name or '' }}">
        </div>
        <div class="field">
          <label>Quantity on Hand</label>
          <input type="number" name="quantity_on_hand" value="{{ product.quantity_on_hand }}" min="0">
        </div>
        <div class="field">
          <label>Reorder Point</label>
          <input type="number" name="reorder_point" value="{{ product.reorder_point }}" min="0">
        </div>
        <div class="field">
          <label>Unit Cost ($)</label>
          <input type="number" name="unit_cost" value="{{ '%.2f' | format(product.unit_cost) }}" min="0" step="0.01">
        </div>
      </div>
      <div style="margin-top:20px;display:flex;gap:10px;">
        <button class="btn success" type="submit">Save Changes</button>
        <a class="btn ghost" href="{{ url_for('billing.warehouse_inventory') }}">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
