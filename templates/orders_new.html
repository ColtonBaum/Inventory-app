{% extends "base.html" %}
{% block title %}New Order{% endblock %}

{% block content %}
<div class="card" style="max-width:800px;margin:0 auto;">
  <div class="card-header">
    <div>
      <div style="font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;">Warehouse</div>
      <h2 style="margin:0;font-size:22px;">New Supply Order</h2>
    </div>
    <a class="btn ghost small" href="{{ url_for('orders.orders_list') }}">Back</a>
  </div>
  <div class="card-body">
    <form method="POST" id="order-form">
      <div class="grid two" style="gap:14px;margin-bottom:24px;">
        <div class="field">
          <label>Your Name</label>
          <input type="text" name="submitted_by" placeholder="First & Last Name" required>
        </div>
        <div class="field">
          <label>Job / Trailer (optional)</label>
          <select name="trailer_id">
            <option value="">— No specific job —</option>
            {% for t in trailers %}
            <option value="{{ t.id }}">{{ t.job_name or ('Trailer #' ~ t.id) }}{% if t.job_number %} ({{ t.job_number }}){% endif %}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field" style="grid-column:1/-1;">
          <label>Notes (optional)</label>
          <input type="text" name="notes" placeholder="Any special instructions or notes">
        </div>
      </div>

      <div style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;">Items Needed</div>

      <div id="lines-container">
        <div class="order-line" style="display:grid;grid-template-columns:160px 1fr 100px 40px;gap:10px;align-items:end;margin-bottom:10px;">
          <div class="field">
            <label>Item Number</label>
            <input type="text" name="item_number" placeholder="e.g. HT-001" list="product-list">
          </div>
          <div class="field">
            <label>Item Name / Description</label>
            <input type="text" name="item_name" placeholder="What do you need?">
          </div>
          <div class="field">
            <label>Quantity</label>
            <input type="number" name="quantity" value="1" min="1">
          </div>
          <div style="padding-bottom:2px;">
            <button type="button" onclick="removeLine(this)" style="background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:8px;padding:10px 13px;cursor:pointer;font-size:16px;min-height:48px;">✕</button>
          </div>
        </div>
      </div>

      <datalist id="product-list">
        {% for p in products %}
        <option value="{{ p.item_number }}">{{ p.item_name or '' }}</option>
        {% endfor %}
      </datalist>

      <button type="button" onclick="addLine()" class="btn ghost small" style="margin-bottom:28px;">+ Add Another Item</button>

      <div style="display:flex;gap:10px;">
        <button class="btn success" type="submit">Submit Order</button>
        <a class="btn ghost" href="{{ url_for('orders.orders_list') }}">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% block scripts %}
{{ super() }}
<script>
function addLine() {
  const container = document.getElementById('lines-container');
  const div = document.createElement('div');
  div.className = 'order-line';
  div.style.cssText = 'display:grid;grid-template-columns:160px 1fr 100px 40px;gap:10px;align-items:end;margin-bottom:10px;';
  div.innerHTML = `
    <div class="field">
      <label>Item Number</label>
      <input type="text" name="item_number" placeholder="e.g. HT-001" list="product-list">
    </div>
    <div class="field">
      <label>Item Name / Description</label>
      <input type="text" name="item_name" placeholder="What do you need?">
    </div>
    <div class="field">
      <label>Quantity</label>
      <input type="number" name="quantity" value="1" min="1">
    </div>
    <div style="padding-bottom:2px;">
      <button type="button" onclick="removeLine(this)" style="background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:8px;padding:10px 13px;cursor:pointer;font-size:16px;min-height:48px;">✕</button>
    </div>
  `;
  container.appendChild(div);
}
function removeLine(btn) {
  const line = btn.closest('.order-line');
  const container = document.getElementById('lines-container');
  if (container.querySelectorAll('.order-line').length > 1) {
    line.remove();
  }
}
</script>
{% endblock %}
{% endblock %}
