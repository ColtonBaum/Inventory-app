{% extends "base.html" %}
{% block title %}New Warehouse Order{% endblock %}

{% block content %}
<div class="card" style="max-width:680px;margin:0 auto;">
  <div class="card-header">
    <h2 style="margin:0;font-size:20px;">Request Warehouse Items</h2>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div style="margin:12px 16px 0;padding:10px 14px;border-radius:8px;font-size:14px;
                  background:{% if cat=='danger' %}#fee2e2{% elif cat=='success' %}#dcfce7{% else %}#fef3c7{% endif %};
                  color:{% if cat=='danger' %}#991b1b{% elif cat=='success' %}#166534{% else %}#92400e{% endif %};">
        {{ msg }}
      </div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('orders.new_order') }}" style="padding:20px;display:grid;gap:16px;">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Your Name</label>
        <input type="text" name="requester_name" placeholder="e.g. John Smith" style="width:100%;box-sizing:border-box;">
      </div>
      <div>
        <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Job / Trailer (optional)</label>
        <select name="trailer_id" style="width:100%;box-sizing:border-box;">
          <option value="">— Select job —</option>
          {% for t in trailers %}
          <option value="{{ t.id }}">{{ t.job_name or ('Trailer #' ~ t.id) }}{% if t.job_number %} ({{ t.job_number }}){% endif %}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Notes (optional)</label>
      <textarea name="notes" rows="2" placeholder="Any special instructions…" style="width:100%;box-sizing:border-box;resize:vertical;"></textarea>
    </div>

    <div>
      <label style="font-size:13px;font-weight:700;display:block;margin-bottom:10px;">Items Needed</label>
      <table style="width:100%;border-collapse:collapse;" id="lineTable">
        <thead>
          <tr>
            <th style="text-align:left;padding:6px 8px;font-size:12px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);">Description</th>
            <th style="text-align:center;padding:6px 8px;font-size:12px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);width:100px;">Qty</th>
            <th style="width:40px;border-bottom:1px solid var(--border);"></th>
          </tr>
        </thead>
        <tbody id="lineBody">
          <tr class="line-row">
            <td style="padding:4px 4px 4px 0;">
              <input type="text" name="item_name" placeholder="Item description…" style="width:100%;box-sizing:border-box;" required>
            </td>
            <td style="padding:4px;">
              <input type="number" name="quantity" min="1" value="1" style="width:100%;box-sizing:border-box;text-align:center;">
            </td>
            <td style="padding:4px;text-align:center;">
              <button type="button" onclick="removeLine(this)" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;">×</button>
            </td>
          </tr>
        </tbody>
      </table>
      <button type="button" onclick="addLine()" class="btn ghost small" style="margin-top:8px;">+ Add Item</button>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:10px;padding-top:4px;">
      <a href="{{ url_for('orders.orders_list') }}" class="btn ghost">Cancel</a>
      <button type="submit" class="btn primary">Submit Order</button>
    </div>
  </form>
</div>

<script>
function addLine() {
  const row = document.createElement('tr');
  row.className = 'line-row';
  row.innerHTML = `
    <td style="padding:4px 4px 4px 0;">
      <input type="text" name="item_name" placeholder="Item description…" style="width:100%;box-sizing:border-box;">
    </td>
    <td style="padding:4px;">
      <input type="number" name="quantity" min="1" value="1" style="width:100%;box-sizing:border-box;text-align:center;">
    </td>
    <td style="padding:4px;text-align:center;">
      <button type="button" onclick="removeLine(this)" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;">×</button>
    </td>`;
  document.getElementById('lineBody').appendChild(row);
  row.querySelector('input[name="item_name"]').focus();
}
function removeLine(btn) {
  const rows = document.querySelectorAll('.line-row');
  if (rows.length > 1) btn.closest('tr').remove();
}
</script>
{% endblock %}
